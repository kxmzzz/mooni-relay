# Render Blueprint — เชื่อม repo นี้แล้ว Render จะตั้งค่าเองทั้งหมด
services:
  - type: web
    name: mooni-relay
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: ADMIN_KEY
        generateValue: true   # Render จะสุ่มรหัสให้ ดู/คัดลอกได้ในหน้า Environment
      - key: AUTH_SECRET
        generateValue: true   # คีย์เซ็นบัตรผ่าน Discord (Render สุ่มให้)
      # ---- ล็อกอิน Discord (ยศ Mooni) — ใส่ค่าเองในหน้า Environment ----
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_ROLE_ID
        sync: false
      - key: DISCORD_PRIME_ROLE_ID
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      # ---- เก็บวันหมดอายุถาวร (Upstash Redis ฟรี) ----
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: DISCORD_INVITE
        sync: false
